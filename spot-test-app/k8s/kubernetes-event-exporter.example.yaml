# Event Exporter というアプリを動かすために必要な Kubernetes リソース一式
# ServiceAccount: Pod ID (IAM User / Role のようなもの)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-event-exporter
  namespace: amazon-cloudwatch
---
# ClusterRole: Pod に許可するアクション (IAM Policy のようなもの)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-event-exporter
rules:
  - apiGroups: [""]
    resources:
      - events
      - pods
      - nodes
      - namespaces
      - services
      - endpoints
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["events.k8s.io"]
    resources:
      - events
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - daemonsets
      - statefulsets
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch
---
# ClusterRoleBinding: ServiceAccount に ClusterRole をアタッチ
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-event-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-event-exporter
subjects:
  - kind: ServiceAccount
    name: kubernetes-event-exporter
    namespace: amazon-cloudwatch
---
# ConfigMap: kubernetes-event-exporter の設定ファイル
# Eventを受信 → stdoutへ出力 という設定
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-event-exporter-config
  namespace: amazon-cloudwatch
data:
  config.yaml: |
    logLevel: info
    logFormat: json
    route:
      routes:
        - match:
            - receiver: stdout
    receivers:
      - name: stdout
        stdout: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-event-exporter
  namespace: amazon-cloudwatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-event-exporter
  template:
    metadata:
      labels:
        app: kubernetes-event-exporter
    spec:
      # 監視系 Pod は On-Demand Node にデプロイする
      nodeSelector:
        workload-type: system
      serviceAccountName: kubernetes-event-exporter
      containers:
        - name: kubernetes-event-exporter
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-1.amazonaws.com/kubernetes-event-exporter:v1.7-amd64
          imagePullPolicy: Always
          args:
            - -conf=/data/config.yaml
          volumeMounts:
            - name: config
              mountPath: /data
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: kubernetes-event-exporter-config
